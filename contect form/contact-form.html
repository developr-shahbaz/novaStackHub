<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contact-form">
  <h2>Contact Us</h2>

  <form id="contactForm">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
    </div>

    <button type="submit">Send Message</button>
  </form>

  <p class="success-msg" id="successMsg">Thank you! Your message has been sent.</p>
</div>

<script>
  const form = document.getElementById('contactForm');
  const successMsg = document.getElementById('successMsg');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    // NOTE: This only shows a success message.
    // To actually send the message somewhere, connect this form to
    // a service like Formspree (formspree.io) or your own backend.

    form.reset();
    form.style.display = 'none';
    successMsg.style.display = 'block';
  });
</script>

</body>
</html>
